name: CI - Kubernetes Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ./MyService

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Build Docker image
        run: docker build -t myservice:latest .

      - name: Start Minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: docker

      - name: Load Docker image into Minikube
        run: minikube image load myservice:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f ../k8s/
          kubectl wait --for=condition=Available --timeout=120s deployment/myservice-deployment

      - name: Check Kubernetes resources
        run: |
          kubectl get pods
          kubectl get deployments
          kubectl get services
          minikube service list

      - name: Run Kubernetes integration test
        run: |
          kubectl wait --for=condition=Ready --timeout=60s pod -l app=myservice

          SERVICE_URL=$(minikube service myservice-service --url)
          echo "Service URL: $SERVICE_URL"

          curl --fail "$SERVICE_URL"
