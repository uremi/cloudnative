apiVersion: apps/v1
kind: Deployment
metadata:
  name: myservice-deployment
  labels:
    app: myservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myservice
  template:
    metadata:
      labels:
        app: myservice
    spec:
      containers:
      - name: myservice-container
        image: remiulman/myservice:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: myservice-service
spec:
  type: NodePort
  selector:
    app: myservice
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
