apiVersion: apps/v1
kind: Deployment
metadata:
  name: rent-service-deployment
  labels:
    app: rent-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rent-service
  template:
    metadata:
      labels:
        app: rent-service
    spec:
      containers:
      - name: rent-service
        image: watson101/mon-service-rent:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: rent-service-service
spec:
  type: NodePort
  selector:
    app: rent-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
